# ─────────────────────────────────────────────────────────────────────────────
# Especificación del dataset de ventanas SoccerNet (Fase 1 — camino liviano).
#
# Esta config es la ÚNICA fuente de verdad para regenerar el dataset: la consumen
# src/data/download.py, src/data/splits.py y src/data/build_dataset.py.
# No hay números mágicos en el código (convención del proyecto).
#
# Camino liviano: el manifest se arma con Labels-v2.json + features ResNet
# pre-extraídas (sin videos, sin password NDA). Los frames llegan en Fase 3.
# ─────────────────────────────────────────────────────────────────────────────

seed: 42

# Subconjunto chico para cerrar el ciclo end-to-end. Escalar a 30-50 cambiando
# solo `num_games`. `source_split` indica de qué split de SoccerNet tomamos la
# lista de partidos; NO es nuestro split (re-particionamos por game_id, ver abajo).
num_games: 32
source_split: train
