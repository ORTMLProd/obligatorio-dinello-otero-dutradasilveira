# Mapeo de las 17 clases de SoccerNet → nuestras 4 clases objetivo de evento.
# Todo lo que no matchee y esté suficientemente lejos de un evento → background.
target_labels:
  goal: ["Goal"]
  card: ["Yellow card", "Red card", "Yellow->red card"]
  substitution: ["Substitution"]
  corner: ["Corner"]

# Ventana ±2s alrededor del timestamp anotado (invariante de la spec del dataset).
window:
  half_window_ms: 2000

# Background: se muestrea de timestamps a ≥ min_gap_s de CUALQUIER anotación, y se
# submuestrea a ratio background:evento (NO se conserva el ratio natural).
background:
  ratio: 2
  min_gap_s: 30

# Features ResNet pre-extraídas: una array por mitad (1_ = primer tiempo,
# 2_ = segundo), 512-dim (PCA), 2 fps. Pooling de la ventana → un vector por ventana.
features:
  files: ["1_ResNET_TF2_PCA512.npy", "2_ResNET_TF2_PCA512.npy"]
  fps: 2
  dim: 512
  pool: mean

# Particionado SIEMPRE por game_id (invariante 1, anti data-leakage).
split:
  train: 0.6
  val: 0.2
  test: 0.2

# Rutas relativas a la raíz del repo. data/ y models/ están gitignored.
paths:
  raw_dir: "data/raw/soccernet"
  processed_dir: "data/processed"
  splits_file: "configs/splits.yaml"
  summary_file: "report/dataset_summary.json"

# Dataset de clips (Fase 3.5): K frames por ventana extraídos de los videos 224p.
# Requiere SOCCERNET_PASSWORD para descargar videos (política NDA).
clips:
  enabled: true
  k: 8 # frames por clip
  clip_seconds: 8 # ventana temporal del clip (±4s alrededor del evento)
  frame_size: 224 # lado del frame (cuadrado), apto para ResNet
  video_files: ["1_224p.mkv", "2_224p.mkv"] # un video por mitad
