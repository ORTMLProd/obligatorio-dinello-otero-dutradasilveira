# ─────────────────────────────────────────────────────────────────────────────
# Especificación del entrenamiento del baseline v0 (Fase 2 — end-to-end).
#
# Única fuente de verdad para `python -m src.models.train`. Sin números mágicos
# en el código (convención del proyecto). El preprocesador se fitea SOLO con el
# split train y se serializa junto al modelo (invariante 3, anti training-serving
# skew); la API carga ese mismo bundle en serving.
#
# Estrategia v0: late fusion [tabular preprocesado ⊕ embedding ResNet pooled].
# Se entrenan dos modelos y se compara; se exporta el mejor por macro-F1. Esto
# prioriza cerrar el ciclo end-to-end por sobre el rendimiento (criterio de la
# consigna) y aporta una discusión de alternativas para el informe.
# ─────────────────────────────────────────────────────────────────────────────

seed: 42

# Se entrenan ambos y se compara en MLflow. LogReg = piso interpretable;
# XGBoost = v0 real (maneja desbalance y no-linealidades del fusion).
models:
  - type: logistic_regression
    params:
      C: 1.0
      max_iter: 1000
      class_weight: balanced # invariante 5: el desbalance se maneja explícitamente
  - type: xgboost
    params:
      max_depth: 6
      n_estimators: 300
      learning_rate: 0.1

features:
  use_embedding: true # late fusion tabular ⊕ resnet_pooled; false → baseline tabular-only
  scale_numeric: true # StandardScaler en numéricas (aplica a LogReg; XGBoost lo ignora)

# Trazabilidad de ML (electivo 1). La API NO depende de MLflow en runtime: carga el
# bundle exportado de model_dir. tracking_uri se resuelve por env var en Docker.
mlflow:
  # sqlite local por defecto (soporta Model Registry; MLflow 3 deprecó el file-store).
  # En Docker se sobreescribe por env var apuntando al server (PR docker-compose).
  tracking_uri: ${MLFLOW_TRACKING_URI:-sqlite:///mlflow.db}
  experiment_name: baseline-v0
  register_model: true # registra el mejor en el Model Registry

# Rutas relativas a la raíz del repo. models/ está gitignored (se regenera con train).
paths:
  model_dir: "models/v0"
  metrics_dir: "report/metrics"

# ─────────────────────────────────────────────────────────────────────────────
# Optimización de modelos (electivo, Fase 3). Lo consume `python -m src.models.tune`.
# Dos sub-técnicas con impacto medido:
#   (1) tuning de hiperparámetros con Optuna,
#   (2) feature selection tabular (cada trial elige un subconjunto de columnas).
# La búsqueda optimiza SOLO macro-F1 de validación; el test se mide una vez al final
# (seleccionar sobre test sería data leakage). `train.py` ignora esta sección.
# ─────────────────────────────────────────────────────────────────────────────
tuning:
  enabled: true
  n_trials: 40
  target_model: xgboost # se tunea el v0 real (XGBoost ganó el baseline)
  select_features: true # cada trial prueba un subconjunto de TABULAR_COLUMNS
  always_keep: [league] # nunca se descarta (señal de contexto barata y robusta)
  # Rangos de búsqueda (sin números mágicos en el código). int→suggest_int, float→suggest_float;
  # log: escala logarítmica; step: discretiza un rango no-log.
  search_space:
    max_depth: { type: int, low: 3, high: 10 }
    n_estimators: { type: int, low: 100, high: 600, step: 50 }
    learning_rate: { type: float, low: 0.01, high: 0.3, log: true }
    subsample: { type: float, low: 0.6, high: 1.0 }
    colsample_bytree: { type: float, low: 0.6, high: 1.0 }
    min_child_weight: { type: int, low: 1, high: 10 }
    gamma: { type: float, low: 0.0, high: 5.0 }
