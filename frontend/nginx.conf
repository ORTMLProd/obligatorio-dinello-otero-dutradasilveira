server {
    listen 80;
    server_name _;

    # Serve the SPA. Unknown routes fall back to index.html (client-side routing).
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend service. The trailing slash on
    # proxy_pass rewrites /api/health -> /health upstream. This keeps a single
    # origin for the browser (no CORS) and hides the backend behind nginx.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Video uploads to /predict/clip exceed nginx's 1MB default. Allow large bodies
        # and a longer read timeout (CPU inference + Grad-CAM can take a while per clip).
        client_max_body_size 200M;
        proxy_read_timeout 300s;
    }
}
