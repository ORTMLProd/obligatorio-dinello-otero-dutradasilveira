services:
  api:
    build: ./backend
    # In production the API would be internal-only (`expose`). We also map it to the
    # host for direct debugging (curl http://localhost:8000/health). The browser never
    # uses this port — it always goes through the frontend's nginx reverse-proxy.
    ports:
      - "8000:8000"
    environment:
      API_LOG_LEVEL: info
    healthcheck:
      # `python` (urllib) instead of curl, which is not present in python:3.12-slim.
      test:
        - CMD
        - python
        - -c
        - import urllib.request, sys; urllib.request.urlopen("http://localhost:8000/health"); sys.exit(0)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "8080:80" # abrir http://localhost:8080
    depends_on:
      api:
        condition: service_healthy

# Fase 2/3 — se agregan cuando corresponda (NO se levantan en Fase 0):
#   mlflow:     servidor de tracking + model registry (Electivo 1)
#   prometheus: scrapea /metrics de la API
#   grafana:    dashboards de monitoreo
